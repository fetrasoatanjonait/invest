<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestPro - Administration Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .admin-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .btn-primary { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #edit-modal { backdrop-filter: blur(8px); z-index: 300; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">

    <div id="loader" class="fixed inset-0 bg-slate-900/60 z-[400] hidden flex flex-col items-center justify-center text-white">
        <div class="spinner mb-4"></div>
        <p class="font-bold tracking-widest text-sm animate-pulse uppercase">Traitement en cours...</p>
    </div>

    <div id="edit-modal" class="fixed inset-0 hidden flex items-center justify-center p-4 bg-slate-900/40">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] p-8 shadow-2xl animate__animated animate__zoomIn">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Modifier le profil</h3>
                <button onclick="closeModal()" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-times-circle text-3xl"></i></button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" id="edit-id">
                <div class="space-y-4">
                    <input type="text" id="edit-nom" placeholder="Nom" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                    <input type="text" id="edit-prenom" placeholder="Prénom" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                    <input type="number" id="edit-age" placeholder="Âge" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                </div>
                <div class="space-y-4">
                    <input type="text" id="edit-tel" placeholder="Téléphone" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                    <input type="text" id="edit-spec" placeholder="Poste / Spécialité" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                    <select id="edit-status" class="w-full p-4 bg-slate-100 border rounded-2xl font-black text-indigo-600">
                        <option value="Actif">Membre Actif ✅</option>
                        <option value="En attente">En attente ⏳</option>
                        <option value="Suspendu">Suspendu ❌</option>
                    </select>
                </div>
                <input type="text" id="edit-adr" placeholder="Adresse complète" class="md:col-span-2 w-full p-4 bg-slate-50 border rounded-2xl font-bold">
            </div>
            <button onclick="updateMember()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black shadow-xl mt-8 uppercase tracking-widest hover:bg-indigo-600 transition">
                Mettre à jour les données
            </button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter">SYSTÈME ADMIN</h1>
                <p class="text-indigo-600 font-bold uppercase text-xs tracking-[0.3em] flex items-center gap-2 mt-2">
                    <span class="w-2 h-2 bg-indigo-600 rounded-full animate-ping"></span> Synchronisé avec GitHub
                </p>
            </div>
            <button onclick="window.location.href='index.html'" class="px-8 py-4 bg-white border border-slate-200 rounded-2xl font-black text-slate-500 hover:bg-slate-50 transition shadow-sm">
                RETOUR AU SITE
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="admin-card p-8">
                    <h3 class="font-black text-sm mb-6 uppercase text-slate-400 tracking-widest flex items-center gap-2">
                        <i class="fas fa-file-alt text-indigo-500"></i> Statuts de l'Association
                    </h3>
                    <textarea id="status-field" class="w-full h-[500px] p-6 bg-slate-50 border-none rounded-[1.5rem] outline-none text-sm font-medium text-slate-600 leading-relaxed resize-none shadow-inner"></textarea>
                    <button onclick="saveStatus()" class="btn-primary w-full mt-6 py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg uppercase text-xs tracking-widest">
                        Enregistrer Statuts
                    </button>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                
                <div class="admin-card p-8">
                    <h3 class="font-black text-sm mb-6 uppercase text-slate-400 tracking-widest">Nouveau Membre</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <input type="text" id="m-nom" placeholder="Nom" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                        <input type="text" id="m-prenom" placeholder="Prénom" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                        <input type="number" id="m-age" placeholder="Âge" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                        <input type="text" id="m-tel" placeholder="Téléphone" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                        <input type="text" id="m-adr" placeholder="Adresse" class="p-4 bg-slate-50 border rounded-2xl font-bold md:col-span-2">
                        <input type="text" id="m-spec" placeholder="Poste / Rôle" class="p-4 bg-slate-50 border rounded-2xl font-bold md:col-span-2">
                        <div class="md:col-span-2 p-6 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50 flex items-center justify-between">
                            <span class="text-xs font-bold text-slate-400">Photo de profil</span>
                            <input type="file" id="m-photo" class="text-xs font-bold text-indigo-600">
                        </div>
                    </div>
                    <button onclick="addMember()" class="btn-primary w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-lg uppercase text-sm">
                        Ajouter au Registre
                    </button>

                    <div id="members-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-10 pt-10 border-t border-slate-100">
                        </div>
                </div>

                <div class="bg-slate-900 p-8 md:p-10 rounded-[3rem] shadow-2xl text-white">
                    <h3 class="font-black text-sm mb-8 uppercase text-indigo-400 tracking-widest">Gestion des Flux / Cotisations</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Sélectionner Membre</label>
                            <select id="pay-mid" class="w-full p-4 bg-white/10 border border-white/10 rounded-2xl text-white font-bold outline-none"></select>
                            <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Montant du versement</label>
                            <input type="number" id="pay-amt" placeholder="Montant Ar" class="w-full p-4 bg-white/10 border border-white/10 rounded-2xl text-white font-bold outline-none">
                        </div>
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Date de paiement</label>
                            <input type="date" id="pay-date" class="w-full p-4 bg-white/10 border border-white/10 rounded-2xl text-white font-bold outline-none">
                            <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Preuve (Reçu)</label>
                            <input type="file" id="pay-fact" class="w-full text-xs pt-4 font-bold text-indigo-300">
                        </div>
                    </div>
                    <button onclick="addPay()" class="btn-primary w-full py-5 bg-emerald-500 text-white rounded-2xl font-black shadow-xl uppercase text-sm">
                        Confirmer la Transaction
                    </button>

                    <div id="payments-list" class="space-y-3 mt-10 pt-10 border-t border-white/5">
                        </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // --- SÉCURITÉ & CONFIG ---
        if(sessionStorage.getItem('isAdmin') !== 'true') window.location.href = "index.html";
        const config = { token: "ghp_" + "mSQCh8UYW5v7ggHV1ZDo62NSstG0Qd4XorDM", repo: "fetrasoatanjonait/invest" };
        let db = { membres: [], status: "", cotisations: [] };
        let shas = { status: "", membres: "", cotisation: "" };

        // --- SYNC ENGINE ---
        window.onload = async () => {
            showLoader(true);
            await Promise.all([sync('membres'), sync('status'), sync('cotisation')]);
            document.getElementById('status-field').value = db.status;
            renderAll();
            showLoader(false);
        };

        async function sync(file) {
            try {
                const res = await fetch(`https://api.github.com/repos/${config.repo}/contents/${file}.json?t=${Date.now()}`, {
                    headers: { Authorization: `token ${config.token}` }
                });
                if(res.ok) {
                    const data = await res.json();
                    shas[file] = data.sha;
                    const content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    if(file === 'cotisation') db.cotisations = Array.isArray(content) ? content : [];
                    else if(file === 'membres') db.membres = Array.isArray(content) ? content : [];
                    else db[file] = content;
                }
            } catch(e) { console.error(e); }
        }

        async function push(file, content) {
            showLoader(true);
            const res = await fetch(`https://api.github.com/repos/${config.repo}/contents/${file}.json`, {
                method: 'PUT',
                headers: { Authorization: `token ${config.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `Admin Sync: ${file}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(content)))),
                    sha: shas[file]
                })
            });
            if(res.ok) {
                const data = await res.json();
                shas[file] = data.content.sha;
                renderAll();
            }
            showLoader(false);
        }

        async function uploadToGithub(file, path) {
            const content = (await toB64(file)).split(',')[1];
            const res = await fetch(`https://api.github.com/repos/${config.repo}/contents/${path}`, {
                method: 'PUT',
                headers: { Authorization: `token ${config.token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Upload image: ${path}`, content: content })
            });
            return res.ok ? `https://raw.githubusercontent.com/${config.repo}/main/${path}?t=${Date.now()}` : "";
        }

        // --- CRUD MEMBRES ---
        async function addMember() {
            const nom = document.getElementById('m-nom').value;
            const prenom = document.getElementById('m-prenom').value;
            const photoFile = document.getElementById('m-photo').files[0];
            const mid = Date.now();

            if(!nom || !prenom) return alert("Nom et Prénom requis");
            showLoader(true);
            let photoUrl = photoFile ? await uploadToGithub(photoFile, `photos/${mid}.png`) : "";

            const member = {
                id: mid,
                nom, prenom, 
                age: document.getElementById('m-age').value,
                tel: document.getElementById('m-tel').value,
                adr: document.getElementById('m-adr').value,
                spec: document.getElementById('m-spec').value,
                photo: photoUrl,
                status: "Actif"
            };

            db.membres.push(member);
            await push('membres', db.membres);
            document.querySelectorAll('.admin-card input').forEach(i => i.value = "");
        }

        function openEditModal(id) {
            const m = db.membres.find(x => x.id == id);
            if(!m) return;
            document.getElementById('edit-id').value = m.id;
            document.getElementById('edit-nom').value = m.nom;
            document.getElementById('edit-prenom').value = m.prenom;
            document.getElementById('edit-age').value = m.age || "";
            document.getElementById('edit-tel').value = m.tel || "";
            document.getElementById('edit-spec').value = m.spec || "";
            document.getElementById('edit-adr').value = m.adr || "";
            document.getElementById('edit-status').value = m.status || "Actif";
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        async function updateMember() {
            const id = document.getElementById('edit-id').value;
            const idx = db.membres.findIndex(x => x.id == id);
            if(idx > -1) {
                db.membres[idx] = {
                    ...db.membres[idx],
                    nom: document.getElementById('edit-nom').value,
                    prenom: document.getElementById('edit-prenom').value,
                    age: document.getElementById('edit-age').value,
                    tel: document.getElementById('edit-tel').value,
                    spec: document.getElementById('edit-spec').value,
                    adr: document.getElementById('edit-adr').value,
                    status: document.getElementById('edit-status').value
                };
                closeModal();
                await push('membres', db.membres);
            }
        }

        async function deleteMember(id) {
            if(confirm("Supprimer ce membre définitivement ?")) {
                db.membres = db.membres.filter(x => x.id !== id);
                await push('membres', db.membres);
            }
        }

        // --- CRUD COTISATIONS ---
        async function addPay() {
            const mid = document.getElementById('pay-mid').value;
            const amt = document.getElementById('pay-amt').value;
            const date = document.getElementById('pay-date').value;
            const factFile = document.getElementById('pay-fact').files[0];

            if(!mid || !amt || !date) return alert("Remplissez tous les champs paiement");
            
            showLoader(true);
            const pid = Date.now();
            let factUrl = factFile ? await uploadToGithub(factFile, `recus/${pid}.png`) : "";

            const pay = { id: pid, mid, amount: amt, date, img: factUrl };
            db.cotisations.push(pay);
            await push('cotisation', db.cotisations);
            document.getElementById('pay-amt').value = "";
        }

        async function deletePay(id) {
            if(confirm("Supprimer cette transaction ?")) {
                db.cotisations = db.cotisations.filter(p => p.id != id);
                await push('cotisation', db.cotisations);
            }
        }

        async function saveStatus() {
            db.status = document.getElementById('status-field').value;
            await push('status', db.status);
        }

        // --- RENDU UI ---
        function renderAll() {
            // Selecteur Paiement
            const sel = document.getElementById('pay-mid');
            sel.innerHTML = db.membres.map(m => `<option value="${m.id}">${m.nom} ${m.prenom}</option>`).join('');

            // Liste Membres
            document.getElementById('members-list').innerHTML = db.membres.map(m => `
                <div class="bg-slate-50 p-5 rounded-3xl flex items-center justify-between border border-slate-100 animate__animated animate__fadeIn">
                    <div class="flex items-center gap-4">
                        <img src="${m.photo || 'https://ui-avatars.com/api/?name='+m.nom}" class="w-12 h-12 rounded-2xl object-cover shadow-sm">
                        <div>
                            <p class="text-sm font-black text-slate-900">${m.nom} ${m.prenom}</p>
                            <p class="text-[10px] font-black text-indigo-500 uppercase">${m.status || 'Actif'}</p>
                        </div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="openEditModal(${m.id})" class="w-9 h-9 flex items-center justify-center bg-white rounded-xl text-indigo-600 shadow-sm border border-slate-100 hover:bg-indigo-600 hover:text-white transition"><i class="fas fa-pen-nib text-xs"></i></button>
                        <button onclick="deleteMember(${m.id})" class="w-9 h-9 flex items-center justify-center bg-white rounded-xl text-red-500 shadow-sm border border-slate-100 hover:bg-red-500 hover:text-white transition"><i class="fas fa-trash text-xs"></i></button>
                    </div>
                </div>
            `).join('');

            // Liste Paiements
            document.getElementById('payments-list').innerHTML = db.cotisations.slice().reverse().map(p => {
                const mem = db.membres.find(m => m.id == p.mid);
                return `
                    <div class="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/5 hover:bg-white/10 transition">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-indigo-500/20 rounded-xl flex items-center justify-center text-indigo-400 font-black text-xs">Ar</div>
                            <div>
                                <p class="text-[11px] font-black text-white">${mem ? mem.nom+' '+mem.prenom : 'Ancien Membre'}</p>
                                <p class="text-[10px] font-bold text-slate-500">${p.date} • <span class="text-emerald-400">${p.amount} Ar</span></p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            ${p.img ? `<a href="${p.img}" target="_blank" class="w-8 h-8 flex items-center justify-center bg-indigo-500 rounded-lg text-white"><i class="fas fa-image text-[10px]"></i></a>` : ''}
                            <button onclick="deletePay(${p.id})" class="w-8 h-8 flex items-center justify-center bg-red-500/20 text-red-400 rounded-lg hover:bg-red-500 hover:text-white transition"><i class="fas fa-times text-[10px]"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showLoader(s) { document.getElementById('loader').classList[s?'remove':'add']('hidden'); }
        const toB64 = f => new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f); });
    </script>
</body>
</html>
