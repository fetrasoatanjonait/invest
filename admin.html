<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestPro - Administration Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .admin-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .btn-primary { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }

        #edit-modal { backdrop-filter: blur(8px); z-index: 300; }
    </style>

<body class="p-4 md:p-8 lg:p-12">

    <div id="loader" class="fixed inset-0 bg-slate-900/60 z-[400] hidden flex flex-col items-center justify-center text-white">
        <div class="spinner mb-4"></div>
        <p class="font-bold tracking-widest text-sm animate-pulse uppercase">Traitement en cours...</p>
    </div>

    <div id="edit-modal" class="fixed inset-0 hidden flex items-center justify-center p-4 bg-slate-900/40">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] p-8 shadow-2xl animate__animated animate__zoomIn">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Modifier le profil</h3>
                <button onclick="closeModal()" class="text-slate-300 hover:text-red-500 transition"><i class="fas fa-times-circle text-3xl"></i></button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="hidden" id="edit-id">
                <div class="space-y-4">
                    <input type="text" id="edit-nom" placeholder="Nom" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                    <input type="text" id="edit-prenom" placeholder="Prénom" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                    <input type="number" id="edit-age" placeholder="Âge" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                </div>
                <div class="space-y-4">
                    <input type="text" id="edit-tel" placeholder="Téléphone" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                    <input type="text" id="edit-spec" placeholder="Poste / Spécialité" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold">
                    <select id="edit-status" class="w-full p-4 bg-slate-100 border rounded-2xl font-black text-indigo-600">
                        <option value="Actif">Membre Actif ✅</option>
                        <option value="En attente">En attente ⏳</option>
                        <option value="Suspendu">Suspendu ❌</option>
                    </select>
                </div>
                <input type="text" id="edit-adr" placeholder="Adresse complète" class="md:col-span-2 w-full p-4 bg-slate-50 border rounded-2xl font-bold">
            </div>
            <button onclick="updateMember()" class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black shadow-xl mt-8 uppercase tracking-widest hover:bg-indigo-600 transition">
                Mettre à jour les données
            </button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter">SYSTÈME ADMIN</h1>
                <p class="text-indigo-600 font-bold uppercase text-xs tracking-[0.3em] flex items-center gap-2 mt-2">
                    <span class="w-2 h-2 bg-indigo-600 rounded-full animate-ping"></span> Synchronisé avec GitHub
                </p>
            </div>
            <button onclick="window.location.href='index.html'" class="px-8 py-4 bg-white border border-slate-200 rounded-2xl font-black text-slate-500 hover:bg-slate-50 transition shadow-sm">
                RETOUR AU SITE
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="admin-card p-8">
                    <h3 class="font-black text-sm mb-6 uppercase text-slate-400 tracking-widest flex items-center gap-2">
                        <i class="fas fa-file-alt text-indigo-500"></i> Statuts de l'Association
                    </h3>
                    <textarea id="status-field" class="w-full h-[500px] p-6 bg-slate-50 border-none rounded-[1.5rem] outline-none text-sm font-medium text-slate-600 leading-relaxed resize-none shadow-inner"></textarea>
                    <button onclick="saveStatus()" class="btn-primary w-full mt-6 py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg uppercase text-xs tracking-widest">
                        Enregistrer Statuts
                    </button>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                
                <div class="admin-card p-8">
                    <h3 class="font-black text-sm mb-6 uppercase text-slate-400 tracking-widest">Nouveau Membre</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <input type="text" id="m-nom" placeholder="Nom" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                        <input type="text" id="m-prenom" placeholder="Prénom" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                        <input type="number" id="m-age" placeholder="Âge" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                        <input type="text" id="m-tel" placeholder="Téléphone" class="p-4 bg-slate-50 border rounded-2xl font-bold">
                        <input type="text" id="m-adr" placeholder="Adresse" class="p-4 bg-slate-50 border rounded-2xl font-bold md:col-span-2">
                        <input type="text" id="m-spec" placeholder="Poste / Rôle" class="p-4 bg-slate-50 border rounded-2xl font-bold md:col-span-2">
                        <div class="md:col-span-2 p-6 border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50 flex items-center justify-between">
                            <span class="text-xs font-bold text-slate-400">Photo de profil</span>
                            <input type="file" id="m-photo" class="text-xs font-bold text-indigo-600">
                        </div>
                    </div>
                    <button onclick="addMember()" class="btn-primary w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-lg uppercase text-sm">
                        Ajouter au Registre
                    </button>

                    <div id="members-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-10 pt-10 border-t border-slate-100">
                        </div>
                </div>

                <div class="bg-slate-900 p-8 md:p-10 rounded-[3rem] shadow-2xl text-white">
                    <h3 class="font-black text-sm mb-8 uppercase text-indigo-400 tracking-widest">Gestion des Flux / Cotisations</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Sélectionner Membre</label>
                            <select id="pay-mid" class="w-full p-4 bg-white/10 border border-white/10 rounded-2xl text-white font-bold outline-none"></select>
                            <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Montant du versement</label>
                            <input type="number" id="pay-amt" placeholder="Montant Ar" class="w-full p-4 bg-white/10 border border-white/10 rounded-2xl text-white font-bold outline-none">
                        </div>
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Date de paiement</label>
                            <input type="date" id="pay-date" class="w-full p-4 bg-white/10 border border-white/10 rounded-2xl text-white font-bold outline-none">
                            <label class="text-[10px] font-black uppercase text-slate-500 ml-2">Preuve (Reçu)</label>
                            <input type="file" id="pay-fact" class="w-full text-xs pt-4 font-bold text-indigo-300">
                        </div>
                    </div>
                    <button onclick="addPay()" class="btn-primary w-full py-5 bg-emerald-500 text-white rounded-2xl font-black shadow-xl uppercase text-sm">
                        Confirmer la Transaction
                    </button>

                    <div id="payments-list" class="space-y-3 mt-10 pt-10 border-t border-white/5">
                        </div>
                </div>

                <div class="bg-red-900/90 p-8 md:p-10 rounded-[3rem] shadow-2xl text-white">
                    <h3 class="font-black text-sm mb-8 uppercase text-red-400 tracking-widest">Gestion des Dépenses</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase text-red-300 ml-2">Description de la dépense</label>
                            <input type="text" id="exp-desc" placeholder="Ex: Achat matériel, Location, etc." class="w-full p-4 bg-white/10 border border-white/10 rounded-2xl text-white font-bold outline-none">
                            <label class="text-[10px] font-black uppercase text-red-300 ml-2">Montant de la dépense</label>
                            <input type="number" id="exp-amt" placeholder="Montant Ar" class="w-full p-4 bg-white/10 border border-white/10 rounded-2xl text-white font-bold outline-none">
                        </div>
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase text-red-300 ml-2">Date de la dépense</label>
                            <input type="date" id="exp-date" class="w-full p-4 bg-white/10 border border-white/10 rounded-2xl text-white font-bold outline-none">
                            <label class="text-[10px] font-black uppercase text-red-300 ml-2">Preuve (Facture)</label>
                            <input type="file" id="exp-fact" class="w-full text-xs pt-4 font-bold text-red-300">
                        </div>
                    </div>
                    <button onclick="addExpense()" class="btn-primary w-full py-5 bg-red-600 text-white rounded-2xl font-black shadow-xl uppercase text-sm">
                        Enregistrer la Dépense
                    </button>

                    <div id="expenses-list" class="space-y-3 mt-10 pt-10 border-t border-white/5">
                        </div>
                </div>

                <div class="bg-purple-900/90 p-8 md:p-10 rounded-[3rem] shadow-2xl text-white">
                    <h3 class="font-black text-sm mb-8 uppercase text-purple-400 tracking-widest">Gestion des Projets</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase text-purple-300 ml-2">Nom du projet</label>
                            <input type="text" id="proj-nom" placeholder="Ex: Construction école, Achat terrain" class="w-full p-4 bg-white/10 border border-white/10 rounded-2xl text-white font-bold outline-none">
                            <label class="text-[10px] font-black uppercase text-purple-300 ml-2">Description</label>
                            <textarea id="proj-desc" placeholder="Description détaillée du projet..." class="w-full h-24 p-4 bg-white/10 border border-white/10 rounded-2xl text-white font-bold outline-none resize-none"></textarea>
                        </div>
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase text-purple-300 ml-2">Date de début</label>
                            <input type="date" id="proj-date-debut" class="w-full p-4 bg-white/10 border border-white/10 rounded-2xl text-white font-bold outline-none">
                            <label class="text-[10px] font-black uppercase text-purple-300 ml-2">Date de fin prévue</label>
                            <input type="date" id="proj-date-fin" class="w-full p-4 bg-white/10 border border-white/10 rounded-2xl text-white font-bold outline-none">
                        </div>
                    </div>
                    <div class="p-6 border-2 border-dashed border-purple-400/30 rounded-2xl bg-purple-500/10 flex items-center justify-between mb-6">
                        <span class="text-xs font-bold text-purple-300">Logo du projet</span>
                        <input type="file" id="proj-logo" class="text-xs font-bold text-purple-300">
                    </div>
                    <button onclick="addProject()" class="btn-primary w-full py-5 bg-purple-600 text-white rounded-2xl font-black shadow-xl uppercase text-sm">
                        Créer le Projet
                    </button>

                    <div id="projects-list" class="space-y-3 mt-10 pt-10 border-t border-white/5">
                        </div>
                </div>

            </div>
        </div>
    </div>
